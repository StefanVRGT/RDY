services:
  rdy-postgres:
    image: postgres:16-alpine
    container_name: rdy-postgres
    environment:
      POSTGRES_DB: rdy
      POSTGRES_USER: rdy
      POSTGRES_PASSWORD: rdy_dev_password
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - rdy-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rdy-postgres-data:
    driver: local
